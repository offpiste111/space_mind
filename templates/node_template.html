<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
    * {
        margin: 0;
        padding: 5px;
        box-sizing: border-box;
    }
    .node-content {
        display: inline-block;
        min-height: 60px;
        min-width: 60px;
        padding: 10px;
        transform: scale({{ scale_factor }});
        transform-origin: top left;
        font-size: 20px;
    }

    .normal_1 {
        margin: 20px auto;
        padding: 20px;
        background-color: #e1eef5;
    }

    .normal_2 {
        color: #000000; 
        background: #ffffff; 
        border: solid 3px #ffc06e; 
        border-radius: 4px;
    }

    .normal_3 {
        margin: 20px auto;
        padding: 20px;
        background-color: #e1eef5;
        position: relative;
    }
    .normal_3::after {
        content: '';
        position: absolute;
        right: 0;
        top: 0;
        border-width: 0 20px 20px 0;
        border-style: solid;
        border-color: #4c9ac0 #fff #4c9ac0;
        box-shadow: -1px 1px 1px rgba(0, 0, 0, 0.15)
    }

    .normal_4 {
        padding: 1em 1.5em;
        margin: 2em 0;
        background-color:#b22222;/*背景色*/
        color:#ffffff;/*文字色*/
        font-weight:bold;
    }
    .normal_5 {
        padding: 1em 1.5em;
        margin: 2em 0;
        background: #ffebf0;/*背景色*/
        background-image: radial-gradient(#fad6de 10%, transparent 25%), radial-gradient(#fad6de 10%, transparent 25%);
        background-position: 0 0, 10px 10px;
        background-size: 20px 20px;
        color:#333;/*文字色*/
    }

    .normal_6 {
        color: #000000; 
        background: #ffffff; 
        border: dashed 3px #ffc3c3; 
        border-radius: 4px;
    }

    .issue_1 {
        margin: 20px auto;
        padding: 20px;
        height: 224px;
        width: 400px;
        background-image: url('data:image/png;base64,{{ issue1_base64 }}');
        background-size:100%; /*背景画像のサイズ指定*/
        background-size: cover;
        background-position: center;
        color: #000000;
        -webkit-text-stroke: 1.5px #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .issue_2 {
        margin: 20px auto;
        padding: 20px;
        height: 224px;
        width: 400px;
        background-image: url('data:image/png;base64,{{ issue2_base64 }}');
        background-size:100%; /*背景画像のサイズ指定*/
        background-position: center;
        color: #000000;
        -webkit-text-stroke: 1.5px #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .issue_3 {
        margin: 20px auto;
        padding: 20px;
        height: 224px;
        width: 400px;
        background-image: url('data:image/png;base64,{{ issue3_base64 }}');
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: high-quality;
        color: #fff0f0;
        -webkit-text-stroke: 1.5px #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
        font-size: 35px;
        font-weight: bold;
    }
    .issue_4 {
        margin: 20px auto;
        padding: 20px;
        height: 200px;
        width: 300px;
        background-image: url('data:image/png;base64,{{ issue4_base64 }}');
        background-size:100%; /*背景画像のサイズ指定*/
        background-position: center;
        color: #000000;
        -webkit-text-stroke: 1.5px #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .issue_5 {
        margin: 20px auto;
        padding: 20px;
        height: 200px;
        width: 300px;
        background-image: url('data:image/png;base64,{{ issue5_base64 }}');
        background-size:100%; /*背景画像のサイズ指定*/
        background-position: center;
        color: #000000;
        -webkit-text-stroke: 1.5px #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .issue_6 {
        margin: 20px auto;
        padding: 20px;
        height: 200px;
        width: 300px;
        background-image: url('data:image/png;base64,{{ issue6_base64 }}');
        background-size:100%; /*背景画像のサイズ指定*/
        background-position: center;
        color: #000000;
        -webkit-text-stroke: 1.5px #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .link_1 {
        margin: 20px auto;
        padding: 20px 20px 20px 55px;
        background-color: #f3f2f3;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="%234c9ac0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>');
        background-position: 10px center;
        background-repeat: no-repeat;
        border-left: 10px solid #4c9ac0;
    }

    .task_1 {
        margin: 20px auto;padding: 20px;background-color: #f3f2f3;border-left: 10px solid #4c9ac0;
    }
    .file_1 {
        margin: 20px auto;
        padding: 20px 20px 20px 55px;
        background-color: #f3f2f3;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="%234c9ac0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>');
        background-position: 10px center;
        background-repeat: no-repeat;
        border-left: 10px solid #4c9ac0;
    }
    .folder_1 {
        margin: 20px auto;
        padding: 20px 20px 20px 55px;
        background-color: #f3f2f3;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="%234c9ac0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>');
        background-position: 10px center;
        background-repeat: no-repeat;
        border-left: 10px solid #4c9ac0;
    }
    </style>
</head>
<body style="margin: 0; padding: 0; background: white;">
    <div class="node-content {{ style_class }}">
        {% if icon_base64 %}
        <img src="data:image/png;base64,{{ icon_base64 }}" style="max-width: 100%; margin-bottom: 10px; display: block;">
        {% endif %}
        <div style="white-space: pre-wrap;">{{ node_name }}</div>
        {% if deadline %}
        <div style="font-size: 14px; color: #ff4d4f; margin-top: 5px;">期限: {{ deadline }}</div>
        {% endif %}
        {% if priority %}
        <div style="font-size: 14px; color: #1890ff; margin-top: 5px;">重要度: {{ "★" * priority }}</div>
        {% endif %}
        {% if urgency %}
        <div style="font-size: 14px; color: #52c41a; margin-top: 5px;">緊急度: {{ "★" * urgency }}</div>
        {% endif %}
    </div>
</body>
</html>
